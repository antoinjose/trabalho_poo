services:
  app:
    build:
      context: ..
      dockerfile: docker/dockerfile
    container_name: trabalho_poo_app
    working_dir: /var/www
    command: sh -c "php artisan key:generate --force && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: trabalho_poo
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
      CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: database
    volumes:
      - ..:/var/www
    depends_on:
      - db
      - redis

  db:
    image: mysql:8.0
    container_name: trabalho_poo_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: trabalho_poo
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: trabalho_poo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  dbdata:
